apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app07
  labels:
    app: todo-app07
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app07
  template:
    metadata:
      labels:
        app: todo-app07
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: todo-app07
          image: 183071452060.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app07:31da4e4
          ports:
            - containerPort: 5000
